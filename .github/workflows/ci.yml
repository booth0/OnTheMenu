name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Type Check & Build
    runs-on: ubuntu-latest

    env:
      # Dummy values for build verification — no DB connection is made during CI.
      # Real credentials are set as environment variables in Vercel for actual deployments.
      DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"
      JWT_SECRET: "ci-placeholder-secret"
      CLOUDINARY_CLOUD_NAME: "placeholder"
      CLOUDINARY_API_KEY: "placeholder"
      CLOUDINARY_API_SECRET: "placeholder"
      CLOUDINARY_UPLOAD_PRESET: "placeholder"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
